<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Sudoku </title>

  <link rel="stylesheet" href="dist/assets/base.style.css">
  <link rel="stylesheet" href="dist/assets/media-queries.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    #sudoku {
      height: 500px;
      width: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-inline: auto;
    }

    @media only screen and (min-device-width: 600px) {
      #sudoku {
        display: grid;
        grid-template-columns: 1fr 20%;
        width: 60%;
      }
    }
  </style>
  <script type="module">
    const start = performance.now()
    import { Sudoku } from "./dist/sudoku.min.js"
    Sudoku(document.getElementById('sudoku'))
    console.log("My code took:" + performance.now() - start)
  </script>
</head>

<body>

  <div id="sudoku"></div>
</body>

</html>
